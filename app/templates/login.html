{% extends "base.html" %}

{% set page_title = "Login" %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/overlay.css') }}">
{% endblock %}

{% block content %}
<div class="overlay" id="login-overlay">
  <div class="overlay-content-wrapper">

    <!-- Header -->
    <div class="overlay-header">
      <h2>Login</h2>
      <span class="badge status-red">Anmeldung notwendig</span>
      <button class="close-button" onclick="closeOverlay('login-overlay')">x</button>
    </div>

    <!-- Form -->
    <form class="overlay-form" method="POST" action="{{ url_for('main.login_page') }}">
      <div class="form-item col">
        <span class="label">Benutzername</span>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="form-item col">
        <span class="label">Passwort</span>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="overlay-actions">
        <button type="button" class="btn btn-secondary" onclick="closeOverlay('login-overlay')">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}
